apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: avalon-cert
  namespace: istio-system        # 证书放在 ingressgateway 所在 ns
spec:
  secretName: avalon-tls        # 要和 Istio Gateway 的 credentialName 一致
  issuerRef:
    name: letsencrypt-prod       # 直接复用现有 ClusterIssuer
    kind: ClusterIssuer
  dnsNames:
    - avalon.pangda.app
