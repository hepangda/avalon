apiVersion: v1
kind: Secret
metadata:
  name: avalon-secrets
type: Opaque
stringData:
  # Change these values before applying in production.
  POSTGRES_USER: avalon
  POSTGRES_PASSWORD: change-me
  POSTGRES_DB: avalon
  DATABASE_URL: postgresql://avalon:change-me@postgres:5432/avalon?schema=public
  DIRECT_URL: postgresql://avalon:change-me@postgres:5432/avalon?schema=public
---
apiVersion: v1
kind: Secret
metadata:
  name: harbor-registry
type: kubernetes.io/dockerconfigjson
stringData:
  # Replace username/password before applying to a fresh cluster.
  .dockerconfigjson: |
    {
      "auths": {
        "harbor.pangda.app": {
          "username": "dev",
          "password": "change-me",
          "auth": "ZGV2OmNoYW5nZS1tZQ=="
        }
      }
    }
