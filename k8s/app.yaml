apiVersion: v1
kind: Service
metadata:
  name: avalon-app
  labels:
    app.kubernetes.io/name: avalon-app
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: http
  selector:
    app.kubernetes.io/name: avalon-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: avalon-app
  labels:
    app.kubernetes.io/name: avalon-app
spec:
  # Game room state is currently held in one Node.js process.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: avalon-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: avalon-app
    spec:
      imagePullSecrets:
        - name: harbor-registry
      containers:
        - name: app
          image: harbor.pangda.app/avalon-online/avalon-online:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: "3000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: avalon-secrets
                  key: DATABASE_URL
            - name: DIRECT_URL
              valueFrom:
                secretKeyRef:
                  name: avalon-secrets
                  key: DIRECT_URL
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
