# Render.com blueprint for Avalon Online.
# A single long-running web service (Next + Socket.IO in one process).
# The Socket.IO server needs a persistent connection, so this MUST be a
# "web" service on a long-process host — not a serverless/edge platform.
services:
  - type: web
    name: avalon-online
    runtime: docker
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false # set in the Render dashboard (Neon/Supabase pooled URL)
      - key: DIRECT_URL
        sync: false # non-pooled URL for prisma migrate deploy
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: HOST
        value: "0.0.0.0"
